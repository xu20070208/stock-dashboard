// ====================== DATA FETCH ======================
async function fetchKLine(code, count) {
  const url = `https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=${code},day,,,${count},qfq`;
  try {
    const r = await fetch(url); const j = await r.json();
    if (j.code!==0||!j.data||!j.data[code]) throw new Error('no data');
    const kl = j.data[code].qfqday || j.data[code].day || [];
    return kl.map(k=>({date:k[0],open:+k[1],close:+k[2],high:+k[3],low:+k[4],volume:+k[5]})).filter(d=>d.open>0);
  } catch(e) { console.warn('Fetch fail:',e); return null; }
}

async function fetchQuotes() {
  const codes = FUNDS.map(f=>f.qt).join(',');
  const url = `https://hq.sinajs.cn/list=${codes}`;
  try {
    const r = await fetch(url,{headers:{'Referer':'https://finance.sina.com.cn'}});
    const t = await r.text(); const results = [];
    for (const line of t.split('\n').filter(l=>l.trim())) {
      const m = line.match(/var hq_str_(\w+)="(.+)"/); if (!m) continue;
      const f = m[2].split(','); if (f.length<5) continue;
      results.push({code:m[1],name:f[0],price:parseFloat(f[3])||0,prevClose:parseFloat(f[2])||0});
    }
    return results;
  } catch(e) { return []; }
}

function genSample() {
  const data=[],now=new Date(); let c=1.5+Math.random()*0.8;
  for(let i=0;i<180;i++){const d=new Date(now);d.setDate(d.getDate()-(180-i));c=+(c*(1+(Math.random()-.5)*0.025)).toFixed(3);if(c<0.5)c=0.5;data.push({date:d.toISOString().slice(0,10),open:+((c*(1+(Math.random()-.5)*0.01)).toFixed(3)),close:c,high:+((c*(1+Math.random()*0.02)).toFixed(3)),low:+((c*(1-Math.random()*0.02)).toFixed(3)),volume:Math.floor(1e7+Math.random()*3e7)});}
  return data;
}

// ====================== ANALYSIS ======================
function analyzeFund(data, fund) {
  if (!data || data.length<20) return null;
  const latest = data[data.length-1];
  const ma20 = data.slice(-20).reduce((s,d)=>s+d.close,0)/20;
  const ma60 = data.length>=60 ? data.slice(-60).reduce((s,d)=>s+d.close,0)/60 : ma20;
  const y1 = data[Math.max(0,data.length-50)]?.close || latest.close;
  const ret1y = ((latest.close-y1)/y1*100);
  const vol = data.slice(-5).reduce((s,d)=>s+d.volume,0)/5;

  // Trend assessment
  let trend='', tCls='';
  if (latest.close > ma20 && ma20 > ma60) { trend='上升趋势（价格>MA20>MA60），均线多头排列'; tCls='good'; }
  else if (latest.close < ma20 && ma20 < ma60) { trend='下跌趋势（价格<MA20<MA60），均线空头排列'; tCls='bad'; }
  else { trend='横盘震荡，短期方向不明确'; tCls='mid'; }

  // DCA simulation
  const dcaResult = simulateDCA(data, 1000);

  // Volatility
  const returns = []; for(let i=1;i<Math.min(data.length,60);i++) returns.push((data[data.length-i].close/data[data.length-i-1].close-1));
  const vola = (Math.sqrt(returns.reduce((s,r)=>s+r*r,0)/returns.length*252)*100).toFixed(1);

  // PE percentile estimation (rough)
  const peLow = fund.peBench[0], peMid = fund.peBench[1], peHigh = fund.peBench[2];
  const priceRank = data.slice(-90).filter(d=>d.close<=latest.close).length / Math.min(90,data.length);
  let peEstimate = '中位附近';
  if (priceRank < 0.3) peEstimate = '低位（近90日价格处于低30%区间，类似PE较低）';
  else if (priceRank > 0.7) peEstimate = '高位（近90日价格处于高30%区间，类似PE较高）';

  // DCA recommendation
  let dcaAdvice = '';
  if (latest.close < ma60 * 0.9) dcaAdvice = `当前价格低于60日均线10%以上，处于相对低位。建议<b style="color:#3fb950">加额定投</b>（比如平时投1000，现在投1500）。下跌是定投的好朋友——同样的钱能买到更多份额。`;
  else if (latest.close > ma60 * 1.15) dcaAdvice = `当前价格高于60日均线15%以上，处于相对高位。建议<b style="color:#f0b90b">正常定投</b>或略微减少金额。不要因为涨了就加大投入——定投的核心是低位多买。`;
  else dcaAdvice = `价格在60日均线附近，波动正常。建议<b style="color:#58a6ff">坚持正常定投</b>，每月固定日期固定金额，不要受短期涨跌影响。`;

  return { latest, ma20, ma60, ret1y, vol, trend, tCls, vola, dcaResult, peEstimate, dcaAdvice, priceRank };
}

function simulateDCA(data, monthlyAmt) {
  const monthly = []; let shares = 0, invested = 0;
  for (let i = 0; i < data.length; i++) {
    if (i % 22 === 0 && i > 0) { // approximate monthly
      const price = data[i].close;
      const bought = monthlyAmt / price;
      shares += bought; invested += monthlyAmt;
      const value = shares * price;
      const pnl = value - invested;
      const pnlPct = (pnl / invested * 100);
      monthly.push({ date: data[i].date, invested, value, pnl, pnlPct, shares, price });
    }
  }
  const lastPrice = data[data.length-1].close;
  const totalValue = shares * lastPrice;
  const totalInvested = invested || 1;
  return { months: monthly.length, totalInvested, totalValue, pnl: totalValue-totalInvested, pnlPct: (totalValue/totalInvested-1)*100, monthly };
}

  const ma20Data = [], ma60Data = [];
  for(let i=0;i<data.length;i++){
    if(i>=19) ma20Data.push([i,+(data.slice(i-19,i+1).reduce((s,d)=>s+d.close,0)/20).toFixed(3)]);
    if(i>=59) ma60Data.push([i,+(data.slice(i-59,i+1).reduce((s,d)=>s+d.close,0)/60).toFixed(3)]);
  }
  const vdata = data.map(d=>({value:d.volume,itemStyle:{color:isUp(d)?'#3fb95060':'#f8514960'}}));

  const isTrend = currentView === 'trend';
  const isDCA = currentView === 'dca';
  const isPrice = currentView === 'price';

  // Main chart

    backgroundColor:'transparent',animation:false,
    grid:{left:60,right:15,top:15,bottom:5},
    xAxis:{type:'category',data:dates,axisLine:{lineStyle:{color:'#30363d'}},axisTick:{show:false},axisLabel:{color:'#8b949e',fontSize:9,interval:Math.floor(data.length/10)},splitLine:{show:false}},
    yAxis:{type:'value',scale:true,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#8b949e',fontSize:10},splitLine:{lineStyle:{color:'#21262d'}}},
    tooltip:{trigger:'axis',backgroundColor:'#161b22',borderColor:'#30363d',textStyle:{color:'#f0f6fc',fontSize:11}},
    series:[]
  };

  if (isPrice || isTrend) {
    mo.series.push({name:'K',type:'candlestick',data:prices,itemStyle:{color:'#3fb950',color0:'#f85149',borderColor:'#3fb950',borderColor0:'#f85149'}});
    mo.series.push({name:'MA20',type:'line',data:ma20Data,smooth:true,symbol:'none',lineStyle:{color:'#f0b90b',width:1.5}});
    mo.series.push({name:'MA60',type:'line',data:ma60Data,smooth:true,symbol:'none',lineStyle:{color:'#58a6ff',width:1.5,type:'dashed'}});
  }

  const vo = {
    backgroundColor:'transparent',animation:false,
    grid:{left:60,right:15,top:5,bottom:18},
    xAxis:{type:'category',data:dates,axisLine:{lineStyle:{color:'#30363d'}},axisTick:{show:false},axisLabel:{color:'#8b949e',fontSize:8,interval:Math.floor(data.length/10)},splitLine:{show:false}},
    yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#8b949e',fontSize:8,formatter:v=>(v/1e4).toFixed(0)+'万'},splitLine:{lineStyle:{color:'#21262d'}}},
    series:[{name:'量',type:'bar',data:vdata,barWidth:'60%'}]
  };

  mChart.setOption(mo,true);
  vChart.setOption(isDCA?{...vo,series:[]}:vo,true);

  // DCA chart
  const a = analyzeFund(data, fund);
  if (a && a.dcaResult.monthly.length > 0) {
    const dcaMonthly = a.dcaResult.monthly;
    document.getElementById('dcaChart').style.display = isDCA ? 'block' : 'none';
    if (isDCA) {
      const do_ = {
        backgroundColor:'transparent',animation:false,
        grid:{left:60,right:15,top:10,bottom:5},
        xAxis:{type:'category',data:dcaMonthly.map(m=>m.date.slice(0,7)),axisLine:{lineStyle:{color:'#30363d'}},axisTick:{show:false},axisLabel:{color:'#8b949e',fontSize:9,interval:Math.floor(dcaMonthly.length/6)},splitLine:{show:false}},
        yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#8b949e',fontSize:9,formatter:v=>(v/1000).toFixed(1)+'k'},splitLine:{lineStyle:{color:'#21262d'}}},
        tooltip:{trigger:'axis',backgroundColor:'#161b22',borderColor:'#30363d',textStyle:{color:'#f0f6fc',fontSize:10}},
        series:[
          {name:'累计投入',type:'line',data:dcaMonthly.map(m=>m.invested),smooth:true,symbol:'none',lineStyle:{color:'#8b949e',width:1},areaStyle:{color:'#8b949e20'}},

function switchView(v) {
  currentView = v;

// ====================== FUND SELECT ======================
async function selectFund(fund) {
  currentFund = fund;
  document.querySelectorAll('.fund-btn').forEach(b=>b.classList.toggle('active',b.dataset.code===fund.code));
  document.getElementById('lastUpdate').textContent = '🔄 加载中...';
  let data = await fetchKLine(fund.code, 200);
  const ds = document.getElementById('dataSource');
  if (data && data.length > 20) { ds.textContent = '📡 腾讯行情'; ds.style.color = '#3fb950'; }
  else { data = genSample(); ds.textContent = '📦 示例(离线)'; ds.style.color = '#f0b90b'; }
  allData = data;
  renderCharts(data, fund);
}

async function updateQuotePrices() {
  const quotes = await fetchQuotes();
  const el = document.getElementById('fundList');
  el.innerHTML = FUNDS.map(f=>{
    const q = quotes.find(qq=>qq.code===f.qt);
    const up = q && (q.price>=q.prevClose);
    const cls = up?'#3fb950':'#f85149';
    const pct = q && q.prevClose ? ((q.price-q.prevClose)/q.prevClose*100).toFixed(2) : 0;
    return `<div class="fund-btn" data-code="${f.code}" onclick="selectFund(FUNDS.find(w=>w.code==='${f.code}'))">
      <span>${f.name}<span style="color:#8b949e;font-size:10px"> ${f.type}</span></span>
      <span><span style="color:${q?cls:'#8b949e'};font-weight:600">${q?q.price:'--'}</span>
      <span style="color:${q?cls:'#8b949e'};font-size:11px">${q&&pct?(up?'+':'')+pct+'%':'--'}</span></span></div>`;
  }).join('');
  document.querySelectorAll('.fund-btn').forEach(b=>b.classList.toggle('active',b.dataset.code===currentFund.code));
}
